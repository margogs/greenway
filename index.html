}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--ink-1)}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);font-feature-settings:"ss01","cv01";-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility;overflow-x:hidden}

.mesh-orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;opacity:0.5}
.mesh-orb.a{width:460px;height:460px;top:-140px;right:-80px;background:radial-gradient(circle, rgba(77,186,135,0.6) 0%, rgba(77,186,135,0) 70%);animation:orbA 20s ease-in-out infinite alternate}

.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0.035;mix-blend-mode:multiply;background-image:url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}

@media (max-width:720px){

function QRish({size=120, color="#0A0A0A", bg="transparent"}){
  const n=21, cell=size/n, mods=[];
  const inFinder=(r,c)=>{const f=(R,C)=>r>=R&&r<R+7&&c>=C&&c<C+7;return f(0,0)||f(0,n-7)||f(n-7,0);};
  for(let r=0;r<n;r++)for(let c=0;c<n;c++){ if(inFinder(r,c))continue; if(((r*5+c*3+r*c+r)%4)===0) mods.push([r,c]); }
  const finder=(R,C,k)=>(
    <g key={k}>
      <rect x={C*cell} y={R*cell} width={7*cell} height={7*cell} fill={color}/>
      <rect x={(C+1)*cell} y={(R+1)*cell} width={5*cell} height={5*cell} fill={bg==="transparent"?"#fff":bg}/>
      <rect x={(C+2)*cell} y={(R+2)*cell} width={3*cell} height={3*cell} fill={color}/>
    </g>
  );
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} shapeRendering="crispEdges" style={{display:"block"}}>
      {bg!=="transparent" && <rect width={size} height={size} fill={bg}/>}
      {mods.map(([r,c],i)=><rect key={i} x={c*cell} y={r*cell} width={cell} height={cell} fill={color}/>)}
      {finder(0,0,"a")}{finder(0,n-7,"b")}{finder(n-7,0,"c")}
    </svg>
  );
}

/* ===== HOOKS ===== */
function useReveal(once=true, amount=0.2){
  const ref = useRef(null);
  const inView = useInView(ref, { once, amount });
  return [ref, inView];
}
function useGlobalSpotlight(){
  useEffect(()=>{
    const el = document.getElementById('spotlight');
    if(!el) return;
    const onMove=(e)=>{ el.style.setProperty('--mx', e.clientX+'px'); el.style.setProperty('--my', e.clientY+'px'); };
    window.addEventListener('mousemove', onMove);
    return ()=>window.removeEventListener('mousemove', onMove);
  },[]);
}

function Phone({screenKey}){
  const screen = SCREENS[screenKey] || SCREENS.ga_checkout;
  const mx = useMotionValue(0);
  const my = useMotionValue(0);
  const rotY = useTransform(mx, [-1, 1], [8, -8]);
  const rotX = useTransform(my, [-1, 1], [-6, 6]);
  const sRotY = useSpring(rotY, { stiffness:120, damping:16, mass:0.6 });
  const sRotX = useSpring(rotX, { stiffness:120, damping:16, mass:0.6 });
  const ref = useRef(null);
  const onMove = (e)=>{
    const r = ref.current.getBoundingClientRect();
    const cx = r.left + r.width/2, cy = r.top + r.height/2;
    mx.set((e.clientX - cx) / (r.width/2));
    my.set((e.clientY - cy) / (r.height/2));
  };
  const onLeave = ()=>{ mx.set(0); my.set(0); };

  return (
    <div style={{perspective:1200, position:"relative", padding:"40px 20px", width:"100%", display:"flex", justifyContent:"center"}}>
      <div style={{position:"absolute", width:380, height:580, borderRadius:"50%", background:"radial-gradient(circle, rgba(77,186,135,0.42) 0%, rgba(77,186,135,0) 65%)", filter:"blur(46px)", zIndex:0, top:"50%", left:"50%", transform:"translate(-50%,-50%)", pointerEvents:"none"}}/>
      <motion.div
        ref={ref}
        onMouseMove={onMove}
        onMouseLeave={onLeave}
        style={{
          rotateY:sRotY, rotateX:sRotX, transformStyle:"preserve-3d",
          width:296, height:600, borderRadius:48,
          background:"linear-gradient(180deg, #232323 0%, #0a0a0a 100%)",
          padding:11, position:"relative", flexShrink:0,
          boxShadow:`0 1px 0 rgba(255,255,255,0.10) inset, 0 0 0 1px rgba(10,10,10,0.06), 0 30px 60px -20px rgba(10,10,10,0.35), 0 60px 120px -30px rgba(77,186,135,0.28), 0 100px 180px -50px rgba(77,186,135,0.16)`
        }}
        initial={{opacity:0, y:40, scale:0.96}}
        animate={{opacity:1, y:0, scale:1}}
        transition={{...SPRING.silky, delay:0.3}}>
        <div style={{position:"absolute",left:-2,top:108,width:3,height:30,background:"#161616",borderRadius:2}}/>
        <div style={{position:"absolute",left:-2,top:154,width:3,height:52,background:"#161616",borderRadius:2}}/>
        <div style={{position:"absolute",left:-2,top:218,width:3,height:52,background:"#161616",borderRadius:2}}/>
        <div style={{position:"absolute",right:-2,top:150,width:3,height:80,background:"#161616",borderRadius:2}}/>
        <div style={{borderRadius:37, overflow:"hidden", background:"var(--phone-bg)", height:"100%", position:"relative"}}>
          <div style={{position:"absolute",top:9,left:"50%",transform:"translateX(-50%)",width:96,height:28,background:"#000",borderRadius:14,zIndex:5}}/>
          <div style={{paddingTop:42,height:"100%",display:"flex",flexDirection:"column"}}>
            <AnimatePresence mode="wait">
              <motion.div
                key={screenKey}
                initial={{opacity:0, y:14, filter:"blur(6px)"}}
                animate={{opacity:1, y:0, filter:"blur(0px)"}}
                exit={{opacity:0, y:-10, filter:"blur(6px)"}}
                transition={{duration:0.42, ease:EASE}}
                style={{flex:"1 1 0",display:"flex",flexDirection:"column",minHeight:0}}>
                <div className="phone-screen">
                  <div className="phone-status">
                    <span className="num">9:41</span>
                    <div style={{display:"flex",gap:4,alignItems:"center"}}>
                      <svg width="14" height="9" viewBox="0 0 14 9" fill="none">
                        <rect x="0.5" y="0.5" width="10" height="8" rx="1.5" stroke="var(--phone-text-1)"/>
                        <rect x="2" y="2" width="7" height="5" fill="var(--phone-text-1)"/>
                        <rect x="11.5" y="3" width="1.5" height="3" rx="0.4" fill="var(--phone-text-1)"/>
                      </svg>
                    </div>
                  </div>
                  <div className="phone-titlebar">
                    <GreenwayLogo height={13} color="#4DBA87"/>
                    <div style={{fontSize:11,fontWeight:600,color:"var(--phone-text-1)",letterSpacing:"-.01em"}}>{screen.title}</div>
                  </div>
                  <div style={{flex:"1 1 0",overflow:"hidden",minHeight:0}}>{screen.render()}</div>
                </div>
              </motion.div>
            </AnimatePresence>
            <div style={{height:22,display:"flex",alignItems:"center",justifyContent:"center",background:"var(--phone-bg)"}}>
              <div style={{width:108,height:4,background:"#000",borderRadius:2,opacity:.85}}/>
            </div>
          </div>
        </div>
      </motion.div>

  );

/* ============================================================
   CJM SECTION
   ============================================================ */
function useSwipe(onLeft, onRight){
  const sx = useRef(null), sy = useRef(null);
  return {
    onTouchStart:(e)=>{ const t=e.touches[0]; sx.current=t.clientX; sy.current=t.clientY; },
    onTouchEnd:(e)=>{
      if(sx.current==null) return;
      const t=e.changedTouches[0];
      const dx=t.clientX-sx.current, dy=t.clientY-sy.current;
      sx.current=null;
      if(Math.abs(dx)>50 && Math.abs(dx)>Math.abs(dy)*1.4){ dx<0 ? onLeft() : onRight(); }
    }
  };
}

function CJMSection({activeJourney, activeStep, setActiveStep, showMetrics, payMode, setPayMode}){
  const j = journeys[activeJourney];
  const hasVariants = !!j.variants;
  const steps = hasVariants ? j.variants[payMode] : j.steps;
  const safeStep = Math.min(activeStep, steps.length - 1);
  const step = steps[safeStep];
  const swipe = useSwipe(
    ()=>setActiveStep(p=>Math.min(steps.length-1, p+1)),
    ()=>setActiveStep(p=>Math.max(0, p-1))
  );
  return (
    <section className="section" style={{maxWidth:1320, margin:"0 auto", padding:"50px 40px 100px", position:"relative"}}>
      {hasVariants && <PayModeToggle payMode={payMode} setPayMode={setPayMode}/>}
      <ProgressRail steps={steps} active={safeStep} onPick={setActiveStep}/>
      <div className="work-grid" style={{display:"grid", gridTemplateColumns:"minmax(340px, 0.9fr) minmax(0, 1.2fr)", gap:80, alignItems:"start"}}>
        <div className="phone-wrap" {...swipe} style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:20}}>
          <Phone screenKey={step.screen}/>
          <MobileStepNav current={safeStep} total={steps.length}
            onPrev={()=>setActiveStep(p=>Math.max(0, p-1))}
            onNext={()=>setActiveStep(p=>Math.min(steps.length-1, p+1))}/>
        </div>
        <StepInfo step={step} stepIdx={safeStep} totalSteps={steps.length} showMetrics={showMetrics}
          onPrev={()=>setActiveStep(p=>Math.max(0, p-1))}
          onNext={()=>setActiveStep(p=>Math.min(steps.length-1, p+1))}
          onRestart={()=>setActiveStep(0)}/>
      </div>
    </section>
  );
}

const GROWTH_RADAR=[
  {icon:"layers", title:"Моментальные выплаты партнёрам", desc:"Моментальные выплаты партнёрам без банковской комиссии — еженедельные начисления приходят на кошелёк сразу."},
  {icon:"crown", title:"Статусная программа Greenway Pro", desc:"Уровни статуса партнёра → банковские перки: повышенный кэшбэк, бесплатная рассрочка, приоритет поддержки."},
  {icon:"link", title:"ИП-кошелёк для партнёров", desc:"Расчётный кошелёк для ИП-партнёров Greenway: массовые закупки, акты, интеграция с 1С. Легализация дохода партнёра."},
];

function NewGrowth({showMetrics}){
  const [gi, setGi] = useState(0);
  const [gstep, setGstep] = useState(0);
  const g = GROWTH[gi];
  const steps = g.steps;
  const safe = Math.min(gstep, steps.length - 1);
  const step = steps[safe];
  const swipe = useSwipe(
    ()=>setGstep(p=>Math.min(steps.length-1, p+1)),
    ()=>setGstep(p=>Math.max(0, p-1))
  );
  const [hRef, hIn] = useReveal(true, 0.2);
  const [rRef, rIn] = useReveal(true, 0.15);
  useEffect(()=>{ setGstep(0); }, [gi]);
  return (
    <section className="ng" style={{maxWidth:1320, margin:"0 auto", padding:"50px 40px 100px", position:"relative", overflow:"hidden", color:"var(--ink-1)"}}>
      <div style={{position:"absolute", top:-120, right:-90, width:520, height:520, borderRadius:"50%", background:"radial-gradient(circle, rgba(77,186,135,0.26) 0%, rgba(77,186,135,0) 66%)", filter:"blur(64px)", pointerEvents:"none"}}/>
      <div style={{maxWidth:1320, margin:"0 auto", position:"relative"}}>

        <motion.div ref={hRef} initial={{opacity:0, y:24}} animate={hIn?{opacity:1, y:0}:{}} transition={{duration:0.8, ease:EASE}} style={{marginBottom:30, maxWidth:800}}>
          <div className="eyebrow" style={{marginBottom:16}}>Точки роста · банковский слой</div>
          <h2 style={{fontSize:"clamp(32px, 5vw, 64px)", fontWeight:800, letterSpacing:"-0.04em", lineHeight:1.0, margin:"0 0 16px", color:"var(--ink-1)"}}>
            Новые <span className="mark-hl"><span>точки роста</span></span>
          </h2>
          <p style={{fontSize:16, color:"var(--ink-2)", lineHeight:1.55, letterSpacing:"-0.005em", margin:0}}>
            Платёж и лояльность повторят все. То, что не могут НКО-конкуренты, — процентный остаток, эскроу и кредит. Каждая идея — отдельный сценарий, который закрывает реальную боль Greenway.
          </p>
        </motion.div>

        <LayoutGroup id="ng">
          <div className="ng-pills" style={{display:"inline-flex", background:"var(--surface-1)", border:"1px solid var(--line-2)", borderRadius:18, padding:5, gap:2, marginBottom:36, maxWidth:"100%", flexWrap:"wrap"}}>
            {GROWTH.map((it,i)=>{
              const active = i===gi;
              return (
                <button key={it.id} onClick={()=>setGi(i)}
                  style={{position:"relative", padding:"11px 16px", borderRadius:14, fontSize:13, fontWeight:600, letterSpacing:"-0.005em", color: active?"#fff":"var(--ink-2)", display:"flex", alignItems:"center", gap:8, zIndex:1, background:"transparent", border:"none", cursor:"pointer", transition:"color 200ms", whiteSpace:"nowrap"}}>
                  {active && <motion.div layoutId="ng-pill" transition={{...SPRING.snappy}} style={{position:"absolute", inset:0, background:"var(--ink-1)", borderRadius:14, zIndex:-1, boxShadow:"0 8px 20px -6px rgba(10,10,10,0.30)"}}/>}
                  <span style={{display:"inline-flex", color: active?"var(--lime)":"var(--ink-3)"}}><GIco d={GI[it.icon]} size={16}/></span>
                  {it.tag}
                </button>
              );
            })}
          </div>
        </LayoutGroup>

        <motion.div key={g.id} initial={{opacity:0, y:12}} animate={{opacity:1, y:0}} transition={{duration:0.4, ease:EASE}}
          style={{display:"flex", alignItems:"center", gap:14, flexWrap:"wrap", marginBottom:30}}>
          <div style={{display:"inline-flex", alignItems:"center", gap:8, padding:"6px 13px", borderRadius:999, background: g.bankOnly?"var(--lime)":"var(--surface-1)", border: g.bankOnly?"none":"1px solid var(--line-2)"}}>
            <span style={{width:6, height:6, borderRadius:"50%", background: g.bankOnly?"var(--ink-1)":"var(--lime-deep)"}}/>
            <span style={{fontSize:11, fontWeight:700, letterSpacing:"0.04em", textTransform:"uppercase", color:"var(--ink-1)"}}>{g.badge}</span>
          </div>
          <div style={{fontSize:13.5, color:"var(--ink-2)", fontWeight:500, letterSpacing:"-0.005em"}}>
            <span style={{color:"var(--ink-3)"}}>Боль Greenway: </span>{g.painGA}
          </div>
        </motion.div>

        <ProgressRail steps={steps} active={safe} onPick={setGstep}/>
        <div className="work-grid" style={{display:"grid", gridTemplateColumns:"minmax(340px, 0.9fr) minmax(0, 1.2fr)", gap:80, alignItems:"start"}}>
          <div className="phone-wrap" {...swipe} style={{display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:20}}>
            <Phone screenKey={step.screen}/>
            <MobileStepNav current={safe} total={steps.length}
              onPrev={()=>setGstep(p=>Math.max(0, p-1))}
              onNext={()=>setGstep(p=>Math.min(steps.length-1, p+1))}/>
          </div>
          <StepInfo step={step} stepIdx={safe} totalSteps={steps.length} showMetrics={showMetrics} showBank={false}
            onPrev={()=>setGstep(p=>Math.max(0, p-1))}
            onNext={()=>setGstep(p=>Math.min(steps.length-1, p+1))}
            onRestart={()=>setGstep(0)}/>
        </div>

        <div ref={rRef} style={{marginTop:84}}>
          <div className="eyebrow no-mark" style={{color:"var(--ink-3)", marginBottom:24, fontWeight:600, letterSpacing:"0.16em", fontSize:10}}>Ещё на радаре</div>
          <div className="ng-extra-grid">
            {GROWTH_RADAR.map((c,i)=>(
              <motion.div key={i} initial={{opacity:0, y:26}} animate={rIn?{opacity:1, y:0}:{}} transition={{duration:0.7, ease:EASE, delay:i*0.1}}
                style={{padding:"28px 26px 30px", borderBottom:"1px solid var(--line-2)", borderRight:(i%3!==2)?"1px solid var(--line-2)":"none"}}>
                <div style={{width:44, height:44, borderRadius:12, background:"var(--surface-1)", border:"1px solid var(--line-2)", display:"flex", alignItems:"center", justifyContent:"center", color:"var(--ink-1)", marginBottom:16}}><GIco d={GI[c.icon]} size={22}/></div>
                <div style={{fontSize:16.5, fontWeight:600, color:"var(--ink-1)", marginBottom:8, letterSpacing:"-0.015em", lineHeight:1.2}}>{c.title}</div>
                <div style={{fontSize:13, color:"var(--ink-3)", lineHeight:1.55}}>{c.desc}</div>
              </motion.div>
            ))}
          </div>
        </div>

        <div style={{marginTop:46, paddingTop:24, borderTop:"1px solid var(--line-2)", fontSize:13, color:"var(--ink-3)", letterSpacing:"-0.005em"}}>
          Платёжный слой повторят все. Банковская лицензия — нет. Это ров Greenway Wallet: моментальные выплаты партнёрам, старт-кредит и проценты на остаток.
        </div>
      </div>
    </section>
  );
}

/* ============================================================

   ============================================================ */
function App(){
  const [activeJourney, setActiveJourney] = useState(0);
  const [activeStep, setActiveStep] = useState(0);
  const [payMode, setPayMode] = useState("online");
  const [showMetrics, setShowMetrics] = useState(true);
  const [scrolled, setScrolled] = useState(false);
  const [view, setView] = useState("cjm");
  const firstRun = useRef(true);
  useGlobalSpotlight();
  useEffect(()=>{ setActiveStep(0); }, [activeJourney, payMode]);
  useEffect(()=>{
    const onScroll = ()=> setScrolled(window.scrollY > 40);
    onScroll();
    window.addEventListener('scroll', onScroll, {passive:true});
    return ()=>window.removeEventListener('scroll', onScroll);
  },[]);
  useEffect(()=>{
    if(firstRun.current){ firstRun.current = false; return; }
    requestAnimationFrame(()=>{
      const el = document.getElementById('view-anchor');
      if(el) window.scrollTo({top: Math.max(0, el.offsetTop - 12), behavior:'smooth'});
    });
  }, [view]);
  return (
    <div style={{minHeight:"100vh"}}>
      <Navbar showMetrics={showMetrics} setShowMetrics={setShowMetrics} scrolled={scrolled}/>
      <Hero view={view} setView={setView} activeJourney={activeJourney} setActiveJourney={setActiveJourney}/>
      <div id="view-anchor">
        {view === "cjm" ? (
          <React.Fragment>
            <CJMSection activeJourney={activeJourney} activeStep={activeStep} setActiveStep={setActiveStep} showMetrics={showMetrics} payMode={payMode} setPayMode={setPayMode}/>
            <BenefitsSection/>
          </React.Fragment>
        ) : (
          <NewGrowth showMetrics={showMetrics}/>
        )}
      </div>
      <Footer/>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
